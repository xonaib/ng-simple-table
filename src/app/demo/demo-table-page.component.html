<div class="demo-header">
  <div>
    <h1 class="demo-title">simple-table</h1>
    <p class="demo-subtitle">
      Declarative Angular Material table with sorting, multi-select, column filters, and pagination.
    </p>
    <p class="demo-github">
      <a
        class="demo-github-link"
        href="https://github.com/xonaib/ng-simple-table"
        target="_blank"
        rel="noopener noreferrer"
      >
        View project on GitHub
      </a>
    </p>
  </div>

  <div class="demo-controls">
    <mat-button-toggle-group
      [value]="isClientSide() ? 'client' : 'server'"
      (change)="isClientSide.set($event.value === 'client')"
      aria-label="Data mode"
    >
      <mat-button-toggle value="server">Server-side</mat-button-toggle>
      <mat-button-toggle value="client">Client-side</mat-button-toggle>
    </mat-button-toggle-group>

    @if (selectedTasks().length > 0) {
      <div class="selection-badge">
        {{ selectedTasks().length }} task{{ selectedTasks().length === 1 ? '' : 's' }} selected
      </div>
    }
  </div>
</div>

<div class="table-container">
  <mat-progress-bar
    class="table-loading-bar"
    mode="indeterminate"
    [class.visible]="isLoading()"
  ></mat-progress-bar>

  <simple-table
    tableId="demo-tasks-table"
    [dataSource]="effectiveDataSource()"
    [tableColumns]="columns"
    [tableConfig]="effectiveConfig()"
    [length]="effectiveLength()"
    [pageIndex]="isClientSide() ? undefined : _pageIndex()"
    (page)="onPage($event)"
    (sortChange)="onSortChange($event)"
    (filterChange)="onFilterChange($event)"
    (selectionChange)="onSelectionChange($event)"
    (refresh)="onRefresh()"
    (columnOrderChange)="onColumnOrderChange($event)"
    (columnWidthChange)="onColumnWidthChange($event)"
  >
    <st-state-storing />
    <st-export [allDataProvider]="getAllForExport" />

    <!-- custom cell template for the title column — the header is auto-generated
         inside simple-table so mat-sort-header works on all columns uniformly -->
    <ng-template cellDef="title" let-row>
      <a class="task-title-link">{{ row.title }}</a>
    </ng-template>
  </simple-table>
</div>
